<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - Gestión Tributaria NUAM</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .brand-logo {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .btn-primary-custom {
            background: linear-gradient(90deg, #0284c7 0%, #4f46e5 100%);
            border: none;
            padding: 0.75rem;
            font-weight: 500;
            border-radius: 10px;
            transition: opacity 0.2s ease;
        }

        .btn-primary-custom:hover {
            opacity: 0.9;
        }

        .form-control-custom {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f8fafc;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }

        .form-control-custom:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #38bdf8;
            color: #f8fafc;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25);
        }

        .alert-custom {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-logo">NUAM Exchange</div>
            <p class="text-secondary small">Sistema de Gestión Tributaria Local</p>
        </div>

        <div id="errorAlert" class="alert alert-custom d-none" role="alert">
            Credenciales incorrectas. Intente nuevamente.
        </div>

        <form id="loginForm" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label small text-secondary">Usuario</label>
                <input type="text" class="form-control form-control-custom" id="username" name="username" required
                    placeholder="Ej: admin">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small text-secondary">Contraseña</label>
                <input type="password" class="form-control form-control-custom" id="password" name="password" required
                    placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 text-white">Ingresar al Sistema</button>
        </form>

        <form id="passwordChangeForm" method="POST" class="d-none">
            {% csrf_token %}
            <div class="alert alert-warning small">
                Este es su primer ingreso. Por seguridad, debe crear una contraseña nueva.
            </div>
            <input type="hidden" id="pc_username">
            <input type="hidden" id="pc_current_password">
            <div class="mb-3">
                <label for="new_password" class="form-label small text-secondary">Nueva Contraseña</label>
                <input type="password" class="form-control form-control-custom" id="new_password" required
                    placeholder="Escriba su nueva clave">
            </div>
            <div class="mb-4">
                <label for="new_password_confirm" class="form-label small text-secondary">Confirmar Contraseña</label>
                <input type="password" class="form-control form-control-custom" id="new_password_confirm" required
                    placeholder="Repita la clave">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 text-white">Guardar e Ingresar</button>
        </form>


    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = e.target;
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.classList.add('d-none');

            const csrfToken = form.querySelector('[name=csrfmiddlewaretoken]').value;
            const data = {
                username: form.username.value,
                password: form.password.value
            };

            try {
                const response = await fetch('{% url "login" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (response.ok && result.success) {
                    if (result.require_password_change) {
                        // Mostrar form de cambio de clave
                        document.getElementById('loginForm').classList.add('d-none');
                        document.getElementById('passwordChangeForm').classList.remove('d-none');
                        document.getElementById('pc_username').value = result.username;
                        document.getElementById('pc_current_password').value = data.password;
                    } else {
                        window.location.href = '{% url "index" %}';
                    }
                } else {
                    errorAlert.innerText = result.error || 'Credenciales incorrectas. Intente nuevamente.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                errorAlert.innerText = 'Ocurrió un error en el servidor. Reintente.';
                errorAlert.classList.remove('d-none');
            }
        });

        document.getElementById('passwordChangeForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.classList.add('d-none');

            const new_pass = document.getElementById('new_password').value;
            const new_pass_confirm = document.getElementById('new_password_confirm').value;

            if (new_pass !== new_pass_confirm) {
                errorAlert.innerText = 'Las contraseñas no coinciden.';
                errorAlert.classList.remove('d-none');
                return;
            }

            const data = {
                username: document.getElementById('pc_username').value,
                current_password: document.getElementById('pc_current_password').value,
                new_password: new_pass
            };

            const csrfToken = document.querySelector('#passwordChangeForm [name=csrfmiddlewaretoken]').value;

            try {
                const response = await fetch('{% url "cambiar_password_inicial" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (response.ok && result.success) {
                    window.location.href = '{% url "index" %}';
                } else {
                    errorAlert.innerText = result.error || 'Error al cambiar contraseña.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                errorAlert.innerText = 'Ocurrió un error en el servidor. Reintente.';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
